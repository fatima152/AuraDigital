services:
  - type: web
    name: aura-digital
    env: node
    rootDir: ./
    buildCommand: cd server && npm install && cd .. && npm install && npm run build
    startCommand: cd server && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
